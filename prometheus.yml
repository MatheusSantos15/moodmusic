global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "user-service"

    static_configs:
      - targets:
        - "host.docker.internal:8000"

  - job_name: "music-service"

    static_configs:
      - targets:
        - "host.docker.internal:8001"

  - job_name: "history-service"

    static_configs:
      - targets:
        - "host.docker.internal:8002"

  - job_name: "recommendation-service"

    static_configs:
      - targets:
        - "host.docker.internal:8003"